name: Smoke Tests
description: Run basic CLI smoke tests

runs:
  using: composite
  steps:
    - name: Smoke test CLI help
      shell: bash
      run: python -m lotto --help

    - name: Smoke test strategies command
      shell: bash
      run: python -m lotto strategies

    - name: Smoke test random generation
      shell: bash
      run: python -m lotto -s random

    - name: Smoke test manual generation
      shell: bash
      run: python -m lotto -s manual --param numbers=1,2,3,4,5,6
